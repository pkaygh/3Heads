<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator Portal | CCST</title>
    <style>
        :root { --primary: #004080; --sidebar-bg: #1e2a44; --success: #27ae60; --danger: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f6f9; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { color: white; font-size: 1.5rem; }
        .menu-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #ddd; text-decoration: none; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.12); color: white; }
        .main-content { margin-left: 280px; flex: 1; padding: 25px; }
        .navbar { background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><h2>Administrator</h2></div>
        <a href="#" class="menu-item active" onclick="showSection('students')"><i class="fas fa-users"></i> All Students</a>
        <a href="#" class="menu-item" onclick="showSection('results')"><i class="fas fa-file-alt"></i> Results Overview</a>
        <a href="#" class="menu-item" onclick="showSection('payments')"><i class="fas fa-money-bill"></i> Payments</a>
        <hr style="margin: 25px 20px; border-color: rgba(255,255,255,0.1);">
        <a href="#" class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="navbar">
            <h3 id="pageTitle">All Students</h3>
            <div style="font-weight:bold;">CCST Administrator</div>
        </div>

        <div id="studentsSection" class="section">
            <div class="card">
                <h3>Student Directory</h3>
                <table id="studentsTable">
                    <thead><tr><th>ID</th><th>Name</th><th>Program</th><th>Level</th><th>Clearance</th></tr></thead>
                    <tbody id="studentsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Other sections can be added here -->
    </div>

    <script>
        let SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby577D_l-KQHTmZu4WBMwYvig-7RwK8qUGjA4GO1vudgpruv3jGtCtLl_3nkVPomIP1/exec?page=administrator';
        let allStudents = [];

        function initScriptUrl() {
            google.script.run
                .withSuccessHandler(url => { 
                    SCRIPT_URL = url; 
                    loadAllStudents(); 
                })
                .withFailureHandler(err => console.error(err))
                .getScriptUrl();
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
            document.getElementById(section + 'Section').style.display = 'block';
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('pageTitle').innerText = section === 'students' ? 'All Students' : 'Other';
        }

        async function loadAllStudents() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_all_students`);
                allStudents = await res.json();
                renderStudents();
            } catch (e) { console.error(e); }
        }

        function renderStudents() {
            const tbody = document.getElementById('studentsBody');
            tbody.innerHTML = '';
            allStudents.slice(1).forEach(row => {   // skip header
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4] ? '✅ Cleared' : '❌ Not'}</td>`;
                tbody.appendChild(tr);
            });
        }

        function logout() {
            if (confirm("Logout from Administrator Portal?")) window.location.replace(SCRIPT_URL);
        }

        window.onload = () => {
            initScriptUrl();
            showSection('students');
        };
    </script>
</body>
</html>
