<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountant Portal | CCST</title>
    <style>
        :root { --primary: #004080; --sidebar-bg: #1e2a44; --success: #27ae60; --danger: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f6f9; display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 25px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h2 { color: white; font-size: 1.5rem; }
        .menu-item { padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #ddd; text-decoration: none; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.12); color: white; }
        .main-content { margin-left: 280px; flex: 1; padding: 25px; }
        .navbar { background: var(--primary); color: white; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .success-btn { background: var(--success); }
        .danger-btn { background: var(--danger); }
        .course-row { display: flex; gap: 8px; margin-bottom: 8px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Accountant Portal</h2>
            <p style="font-size:0.9rem; opacity:0.8;">Financial & Academic Control</p>
        </div>
        <a href="#" class="menu-item active" onclick="showSection('search')"><i class="fas fa-search"></i> Search Student</a>
        <a href="#" class="menu-item" onclick="showSection('courses')"><i class="fas fa-book"></i> Manage Courses</a>
        <a href="#" class="menu-item" onclick="showSection('clearance')"><i class="fas fa-check-circle"></i> Financial Clearance</a>
        <a href="#" class="menu-item" onclick="showSection('payments')"><i class="fas fa-money-bill"></i> Payment Records</a>
        <hr style="margin: 25px 20px; border-color: rgba(255,255,255,0.1);">
        <a href="#" class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="main-content">
        <div class="navbar">
            <h3 id="pageTitle">Search Student</h3>
            <div style="font-weight:bold;">CCST Accountant</div>
        </div>

        <!-- Your sections (searchSection, coursesSection, clearanceSection, paymentsSection) go here -->
        <!-- Paste the full section HTML from your original accountant.html here -->

    </div>

    <script>
        let SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxe8RXV8emNhVjKpbLV374ZHMJh610lSzP8RhcH9akFezJSenkvyaRl2OzK1PFMsbtm/exec?page=accoutant';
        let currentStudent = null;

        function initScriptUrl() {
            google.script.run
                .withSuccessHandler(url => { SCRIPT_URL = url; })
                .withFailureHandler(err => console.error(err))
                .getScriptUrl();
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
            document.getElementById(section + 'Section').style.display = 'block';
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('pageTitle').innerText = 
                section === 'search' ? 'Search Student' : 
                section === 'courses' ? 'Manage Courses' : 
                section === 'clearance' ? 'Financial Clearance' : 'Payment Records';
        }

        async function searchStudent() {
            const id = document.getElementById('searchId').value.trim();
            if (!id) return alert("Please enter Student ID");
            try {
                const res = await fetch(`${SCRIPT_URL}?action=accountant_search&id=${encodeURIComponent(id)}`);
                const data = await res.json();
                if (data.error) return alert(data.error);
                currentStudent = data;
                document.getElementById('studentResult').style.display = 'block';
                document.getElementById('resName').innerText = data.name;
                document.getElementById('resInfo').innerText = `${data.program} | Level ${data.level} | ID: ${data.id}`;
                updateClearanceButton(data.isCleared);
            } catch (e) { alert("Error connecting to server"); }
        }

        function updateClearanceButton(isCleared) {
            const btn = document.getElementById('toggleBtn');
            if (isCleared) {
                btn.innerText = "✅ FINANCIALLY CLEARED";
                btn.style.background = "#27ae60";
            } else {
                btn.innerText = "❌ MARK AS CLEARED";
                btn.style.background = "#e74c3c";
            }
        }

        async function toggleClearance() {
            if (!currentStudent) return;
            const newStatus = !currentStudent.isCleared;
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'toggle_clearance', id: currentStudent.id, cleared: newStatus })
                });
                const result = await res.json();
                if (result.success) {
                    currentStudent.isCleared = newStatus;
                    updateClearanceButton(newStatus);
                    alert(newStatus ? "Student marked as financially cleared!" : "Clearance removed.");
                }
            } catch (e) { alert("Failed to update clearance"); }
        }

        // Add your other functions (addCourseRow, uploadResults, etc.) here from original file

        function logout() {
            if (confirm("Logout from Accountant Portal?")) window.location.replace(SCRIPT_URL);
        }

        window.onload = () => {
            initScriptUrl();
            showSection('search');
        };
    </script>
</body>
</html>
